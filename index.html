<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midtrans Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['Plus Jakarta Sans', 'monospace'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-900 flex items-center justify-center p-4 lg:p-8">
    <div id="successModal"
        class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-md px-4">
        <div
            class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center shadow-2xl relative overflow-hidden animate-in zoom-in duration-300">
            <div
                class="mb-6 inline-flex items-center justify-center w-24 h-24 rounded-full bg-emerald-100 text-emerald-600">
                <i data-lucide="check-circle-2" class="w-12 h-12 success-check"></i>
            </div>
            <h3 class="text-2xl md:text-3xl font-bold mb-2">Woooo! Sukses</h3>
            <p class="text-slate-500 mb-8">Pembayaran berhasil diverifikasi. Pesanan Anda sedang diproses.</p>
            <button onclick="window.location.reload()"
                class="w-full bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl hover:bg-slate-800 transition-all">Selesai</button>
        </div>
    </div>

    <div id="mainCard"
        class="max-w-6xl w-full bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 overflow-hidden flex flex-col md:flex-row border border-slate-100 transition-all-slow">

        <div id="leftColumn"
            class="w-full md:w-1/2 p-8 lg:p-12 bg-slate-50/50 border-r border-slate-100 transition-all-slow">
            <div id="formSection">
                <h2 class="text-2xl md:text-3xl font-bold tracking-tight mb-6 md:mb-8">Detail Pesanan</h2>
                <form id="checkoutForm" class="space-y-6">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 ml-1">Order
                            ID</label>
                        <input type="text" id="order_id" readonly
                            class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-2xl font-mono text-sm text-slate-500 outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 ml-1">Nama
                            Lengkap</label>
                        <input type="text" id="first_name" placeholder="Nama Anda"
                            class="w-full px-4 py-3 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label
                                class="text-xs font-semibold uppercase tracking-wider text-slate-500 ml-1">Email</label>
                            <input type="email" id="email" placeholder="email@example.com"
                                class="w-full px-4 py-3 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 ml-1">No.
                                HP</label>
                            <input type="tel" id="phone" placeholder="08123456789"
                                class="w-full px-4 py-3 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10">
                        </div>
                    </div>
                    <div class="space-y-1.5 pt-2">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 ml-1">Total
                            Pembayaran</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">Rp</span>
                            <input type="number" id="gross_amount" value="10000"
                                class="w-full pl-12 pr-4 py-4 border border-slate-200 rounded-2xl outline-none text-xl md:text-2xl font-bold bg-white">
                        </div>
                    </div>
                </form>
            </div>

            <div id="paymentInfo" class="hidden animate-in slide-in-from-bottom-4 duration-500 max-w-md mx-auto">
                <button onclick="togglePaymentInfo(false)"
                    class="mb-6 flex items-center gap-2 text-slate-400 hover:text-slate-600 font-semibold transition-all">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    Ubah Metode
                </button>
                <h2 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8 leading-tight">Menunggu Pembayaran</h2>

                <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm mb-6">
                    <div id="methodLogoContainer" class="flex justify-center mb-10 pb-6 border-b border-slate-50">
                        <img id="methodLogo" src="" alt="Method Logo" class="h-10 w-auto">
                    </div>
                    <div id="vaContainer" class="hidden space-y-6">
                        <div>
                            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block mb-2"
                                id="vaTitle">Virtual Account</label>
                            <div class="flex items-center justify-between">
                                <span id="vaNumberDisplay"
                                    class="text-lg md:text-xl font-bold tracking-widest font-mono text-slate-800 leading-none">---</span>
                                <button onclick="copyText('vaNumberDisplay', this)"
                                    class="p-2.5 bg-slate-50 text-slate-400 rounded-xl hover:bg-slate-100 hover:text-slate-600 transition-all active:scale-90"
                                    title="Copy">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div id="merchantIdContainer" class="hidden pt-4 border-t border-slate-100">
                            <label
                                class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block mb-2">Merchant
                                ID</label>
                            <div class="flex items-center justify-between">
                                <span id="merchantIdDisplay"
                                    class="text-lg md:text-xl font-bold tracking-widest font-mono text-slate-800 leading-none">---</span>
                                <button onclick="copyText('merchantIdDisplay', this)"
                                    class="p-2.5 bg-slate-50 text-slate-400 rounded-xl hover:bg-slate-100 hover:text-slate-600 transition-all active:scale-90"
                                    title="Copy">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="mandiriContainer" class="hidden space-y-6">
                        <div>
                            <label
                                class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block mb-2">Biller
                                Code</label>
                            <div class="flex items-center justify-between">
                                <span id="billerCodeDisplay"
                                    class="text-lg md:text-xl font-bold tracking-widest font-mono text-slate-800 leading-none">---</span>
                                <button onclick="copyText('billerCodeDisplay', this)"
                                    class="p-2.5 bg-slate-50 text-slate-400 rounded-xl hover:bg-slate-100 hover:text-slate-600 transition-all active:scale-90"
                                    title="Copy">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div class="pt-4 border-t border-slate-100">
                            <label
                                class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block mb-2">Bill
                                Key</label>
                            <div class="flex items-center justify-between">
                                <span id="billKeyDisplay"
                                    class="text-lg md:text-xl font-bold tracking-widest font-mono text-slate-800 leading-none">---</span>
                                <button onclick="copyText('billKeyDisplay', this)"
                                    class="p-2.5 bg-slate-50 text-slate-400 rounded-xl hover:bg-slate-100 hover:text-slate-600 transition-all active:scale-90"
                                    title="Copy">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="qrContainer" class="hidden text-center py-2">
                        <label id="qrLabel"
                            class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block mb-6">Scan QR
                            Code</label>
                        <div
                            class="relative inline-block mx-auto p-5 bg-slate-50 rounded-3xl border border-slate-100 mb-6 group transition-all hover:bg-white hover:shadow-xl hover:shadow-blue-100/50">
                            <img id="qrDisplay" class="w-40 h-40 mix-blend-darken" src="" alt="QR">
                        </div>
                        <button onclick="copyQRUrl(this)"
                            class="flex items-center justify-center gap-2 w-full text-blue-600 font-bold text-xs hover:text-blue-700 transition-all group">
                            <i data-lucide="link" class="w-3 h-3 transition-transform group-hover:rotate-12"></i>
                            Copy QR Simulator Link
                        </button>
                    </div>
                </div>

                <div class="space-y-4">
                    <a id="simulatorBtn" href="#" target="_blank"
                        class="w-full flex items-center justify-center gap-3 bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl shadow-xl hover:bg-slate-800 transition-all group">
                        <span>Buka Simulator Midtrans</span>
                        <i data-lucide="external-link"
                            class="w-4 h-4 text-slate-400 transition-all group-hover:text-white group-hover:translate-x-0.5 group-hover:-translate-y-0.5"></i>
                    </a>
                </div>
            </div>
        </div>

        <div id="rightColumn" class="w-full md:w-1/2 p-8 lg:p-12 flex flex-col transition-all-slow">
            <h2 class="text-2xl md:text-3xl font-bold tracking-tight mb-6 md:mb-8 leading-tight">Pilih Metode Pembayaran</h2>
            <div id="methods" class="space-y-8 mb-10 overflow-y-auto max-h-[380px] pr-2 custom-scrollbar">
                <div class="space-y-4">
                    <h3
                        class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] ml-1 flex items-center gap-2">
                        <i data-lucide="landmark" class="w-3 h-3"></i>
                        Virtual Account
                    </h3>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3">
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="bca" class="peer sr-only" checked>
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/bca.svg" alt="BCA"
                                    class="h-6 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="bni" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/bni.svg" alt="BNI"
                                    class="h-6 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="bri" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/bri.svg" alt="BRI"
                                    class="h-6 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="mandiri" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/mandiri.svg" alt="Mandiri"
                                    class="h-6 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="permata" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/permata.svg" alt="Permata"
                                    class="h-6 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="cimb" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/cimb.svg" alt="CIMB"
                                    class="h-6 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>

                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="bsi" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/bsi.svg" alt="BSI"
                                    class="h-6 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3
                        class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] ml-1 flex items-center gap-2">
                        <i data-lucide="wallet" class="w-3 h-3"></i>
                        E-Wallet & QRIS
                    </h3>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3">
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="qris" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/qris.svg" alt="QRIS"
                                    class="h-8 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="gopay" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/gopay.svg" alt="Gopay"
                                    class="h-6 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3
                        class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] ml-1 flex items-center gap-2">
                        <i data-lucide="store" class="w-3 h-3"></i>
                        Gerai Ritel
                    </h3>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3">
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="alfamart" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/alfamart.svg" alt="Alfamart"
                                    class="h-8 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="indomaret" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/Indomaret.svg" alt="Indomaret"
                                    class="h-8 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3
                        class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] ml-1 flex items-center gap-2">
                        <i data-lucide="credit-card" class="w-3 h-3"></i>
                        Cicilan / Paylater
                    </h3>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3">
                        <label class="group relative cursor-pointer">
                            <input type="radio" name="payment_method" value="akulaku" class="peer sr-only">
                            <div
                                class="flex items-center justify-center p-4 h-20 border-2 border-slate-100 rounded-2xl bg-slate-50/20 peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all group-hover:bg-slate-100/50">
                                <img src="assets/images/akulaku.svg" alt="Akulaku"
                                    class="h-6 w-auto grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all opacity-60 group-hover:opacity-100 peer-checked:opacity-100">
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="mt-auto">
                <button type="button" id="payButton"
                    class="w-full bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white font-bold py-5 px-6 rounded-[2rem] shadow-2xl shadow-blue-100 transition-all flex justify-center items-center gap-3">
                    <span id="btnText" class="text-lg">Bayar Sekarang</span>
                    <div id="btnSpinner"
                        class="hidden animate-spin h-5 w-5 border-3 border-white/30 border-t-white rounded-full"></div>
                </button>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
